spring:
  thymeleaf:
    prefix: classpath:/templates/
    check-template-location: true
    suffix: .html
    encoding: UTF-8
    mode: HTML
    cache: false
  servlet:
    multipart:
     max-file-size: 10MB           # 单个文件大小限制
     max-request-size: 100MB        # 总请求大小限制
     enabled: true                   # 启用文件上传
     file-size-threshold: 2KB        # 文件写入磁盘的阈值
     location: /tmp                  # 临时文件存储位置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog_system
    username: root
    password: 20010122
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

